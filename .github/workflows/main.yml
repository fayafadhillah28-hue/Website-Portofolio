```
name: Deploy Website Portofolio to Hostdata

on:
  push:
    branches:
      - main  # Otomatis deploy setiap kamu push ke branch main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3

    - name: 🚀 Sync files to Hostdata
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        # Data ini diambil dari GitHub Secrets (bukan ditulis langsung di sini)
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        # Folder di hosting kamu, biasanya 'public_html' atau 'httpdocs'
        server-dir: ./public_html/ 
        # File yang akan dikirim (semua yang ada di repo)
        local-dir: ./
```
