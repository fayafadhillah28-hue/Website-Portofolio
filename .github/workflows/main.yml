name: Build & Deploy ke Hosting via FTP

on:
  push:
    branches:
      - main  # Otomatis deploy saat push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout kode dari repo
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Deploy langsung via FTP (tanpa build karena HTML/CSS/JS biasa)
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /public_html/
          protocol: ftp
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            README.md
