name: Deploy Portfolio to Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Upload via FTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps                        # Ganti dari ftp ke ftps
          port: 21
          server-dir: /                         # Sudah langsung ke public_html
          security: loose                       # Penting: agar tidak strict TLS
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            README.md
